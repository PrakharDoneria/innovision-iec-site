<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovision 2K26 Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="app.js" defer></script>
    
</head>
<body class="antialiased flex flex-col min-h-screen">
    <header class="glass-header sticky top-0 px-6 py-4 z-20">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <h1 class="font-extrabold text-xl">Innovision <span class="text-indigo-600">2K26</span></h1>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 bg-indigo-50 px-3 py-1.5 rounded-full border border-indigo-100">
                    <span id="reg-count" class="text-indigo-700 font-bold text-sm">0</span>
                    <span class="hidden sm:inline text-indigo-400 text-[10px] font-bold uppercase tracking-wider">Entries</span>
                </div>
                <button onclick="exportCSV()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-md active:scale-95">Export</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 flex-grow">
        <div class="mb-8 space-y-4">
            <input type="text" id="search" placeholder="Search name or team..." class="w-full p-4 rounded-2xl bg-white shadow-sm ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none text-lg">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <select id="f-college" class="filter-opt"><option value="">All Colleges</option></select>
                <select id="f-category" class="filter-opt"><option value="">All Categories</option></select>
                <select id="f-event" class="filter-opt"><option value="">All Events</option></select>
            </div>
        </div>
        <div id="student-list" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        <div id="empty" class="hidden text-center py-24 text-slate-400 italic">No registrations found.</div>
    </main>

    <footer class="py-8 px-6 text-center">
        <div class="max-w-5xl mx-auto border-t border-slate-200 pt-6">
            <p class="text-slate-400 text-[11px] font-medium tracking-wide uppercase mb-2">Innovision 2K26 Admin Portal</p>
            <a href="mailto:prakhar.btech2024@ieccollege.com?subject=Bug Report - Innovision Dashboard" 
               class="report-button inline-flex items-center gap-2">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                <span>Found a bug? Report to Developer</span>
            </a>
        </div>
    </footer>
</body>
</html>
